apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: monitoring
  annotations:
    eks.amazonaws.com/role-arn: ${MONITORING_AGENT_ROLE_ARN}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-logs-reader
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-logs-reader
subjects:
- kind: ServiceAccount
  name: dashboard
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: dashboard-logs-reader
  apiGroup: rbac.authorization.k8s.io
