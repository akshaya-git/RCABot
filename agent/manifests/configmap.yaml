apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-agent-config
  namespace: monitoring
data:
  AWS_REGION: "${AWS_REGION}"
  BEDROCK_MODEL_ID: "${BEDROCK_MODEL_ID}"
  CLOUDWATCH_NAMESPACES: "${CLOUDWATCH_NAMESPACES}"
  COLLECTION_INTERVAL: "${COLLECTION_INTERVAL}"
  SERVICENOW_ASSIGNMENT_GROUP: "${SERVICENOW_ASSIGNMENT_GROUP}"
  SERVICENOW_CALLER_ID: "${SERVICENOW_CALLER_ID}"
  OPENSEARCH_ENDPOINT: "${OPENSEARCH_ENDPOINT}"
  SNS_TOPIC_ARN: "${SNS_TOPIC_ARN}"
  RAG_S3_BUCKET: "${RAG_S3_BUCKET}"
  RAG_S3_RUNBOOKS_PREFIX: "runbooks/"
  RAG_S3_CASE_HISTORY_PREFIX: "case-history/"
  ENABLE_LOGS_COLLECTOR: "false"
  ENABLE_INSIGHTS_COLLECTOR: "false"
  ENABLE_ALARMS_COLLECTOR: "true"
  ENABLE_METRICS_COLLECTOR: "true"
